<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI - Multi-Robot Art Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: 59 130 246; --bg: 9 9 11; --panel: 24 24 27; }
        .chat-bubble-ai { background: rgb(241 245 249); color: rgb(15 23 42); border-radius: 20px 20px 20px 4px; }
        .message { max-width: 78%; padding: 14px 20px; }
        .message p { overflow-wrap: break-word; word-break: break-word; max-width: 100%; white-space: pre-wrap; }
        .tag { font-size: 0.75rem; color: rgb(59 130 246); font-weight: 600; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .twitch-msg { font-size: 0.95rem; line-height: 1.3; }
    </style>
</head>
<body class="bg-[rgb(var(--bg))] text-white h-screen flex">
    <div class="flex-1 flex flex-col">
        <div class="h-14 border-b border-zinc-800 px-4 flex items-center bg-[rgb(var(--panel))]">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="font-semibold text-lg tracking-tight">MULTI-ROBOT ART EXHIBIT</span>
                <span class="text-xs px-3 py-1 bg-amber-500 text-black rounded-full font-medium">ENDLESS FAST CHATTER</span>
                <span class="text-xs text-zinc-400">boogercheeseonry</span>
            </div>
            <button onclick="toggleSettings()" class="ml-auto text-zinc-400 hover:text-white">⚙️</button>
        </div>
        <div id="chatContainer" class="flex-1 overflow-y-auto scroll-container p-6 space-y-6 bg-[rgb(var(--bg))]"></div>
    </div>

    <div class="w-80 border-l border-zinc-800 bg-[rgb(var(--panel))] flex flex-col">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <h3 class="font-semibold">Twitch Chat <span id="twitchStatus" class="text-xs px-2 py-0.5 bg-green-400 text-black rounded">LIVE • AUTO</span></h3>
        </div>
        <div id="twitchContainer" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm twitch-msg bg-black/30"></div>
        <div class="p-4 border-t border-zinc-800 text-center text-xs text-zinc-400">
            AUTO: tiny models only → endless natural chatter
        </div>
    </div>

    <div onclick="if(event.target.id==='modal')hideSettings()" id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" class="bg-[rgb(var(--panel))] w-full max-w-lg mx-4 rounded-3xl p-6">
            <h2 class="text-lg font-semibold mb-4">Art Exhibit Settings</h2>
            <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">Router Model (fastest)</label>
            <input id="routerModel" value="phi-mini-moe-q2" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 mb-4 text-sm">
            <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">Small Specialist Models</label>
            <input id="specialistModels" value="phi-mini-moe-q2,phi-3.1-mini,qwen2.5-1.5b,lfm2.5-1.2b-instruct-q4,lfm2.5-1.2b-thinking-q4,tiny-moe" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 mb-4 text-sm">
            <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">System Prompt (short & natural)</label>
            <textarea id="systemPrompt" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">You are a chaotic helpful robot. Chat like a real person — short, casual, fun replies with emojis. Max 280 characters.</textarea>
            <div class="flex items-center gap-3 mt-6">
                <input type="checkbox" id="endlessChatter" checked class="w-5 h-5 accent-[rgb(var(--primary))] bg-zinc-800">
                <label for="endlessChatter" class="text-sm">Endless Background Chatter (art exhibit mode)</label>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="hideSettings()" class="px-6 py-3 text-zinc-400">Cancel</button>
                <button onclick="hideSettings()" class="px-8 py-3 bg-[rgb(var(--primary))] rounded-3xl">Save</button>
            </div>
        </div>
    </div>

    <script>
        let messages = [];
        const chatContainer = document.getElementById('chatContainer');
        let twitchWS = null;
        let twitchMessages = [];
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 20;
        let autoInterval = null;
        let backgroundInterval = null;
        let lastProcessedCount = 0;

        function scrollToBottom() {
            requestAnimationFrame(() => { chatContainer.scrollTop = chatContainer.scrollHeight; });
        }

        function addTaggedResponse(modelName, target, reply) {
            const div = document.createElement('div');
            div.className = 'flex justify-start';
            div.innerHTML = `<div class="message chat-bubble-ai"><span class="tag">[${modelName}] to ${target}:</span><p class="whitespace-pre-wrap mt-1">${reply}</p></div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        async function callModel(model, prompt, targetTag) {
            try {
                const res = await fetch('http://localhost:11434/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: 'system', content: document.getElementById('systemPrompt').value }, { role: 'user', content: prompt }],
                        stream: false,
                        options: { temperature: 0.9 }
                    })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                let reply = data.message.content.trim();
                if (reply.length > 280) reply = reply.substring(0, 277) + '...';

                if (targetTag !== 'Router') {
                    addTaggedResponse(model, targetTag, reply);
                }
                return reply;
            } catch (err) {
                return null;
            }
        }

        async function autoProcessCrowd() {
            if (twitchMessages.length <= lastProcessedCount) return;
            const latestMsg = twitchMessages[twitchMessages.length - 1].message;
            if (localStorage.getItem('lastProcessedMsg') === latestMsg) {
                lastProcessedCount = twitchMessages.length;
                return;
            }
            lastProcessedCount = twitchMessages.length;
            localStorage.setItem('lastProcessedMsg', latestMsg);

            const specialists = document.getElementById('specialistModels').value.split(',').map(m => m.trim()).filter(Boolean);
            const router = document.getElementById('routerModel').value.trim();

            let chosenModel = await callModel(router, `Twitch said: "${latestMsg}". Pick ONE model from this exact list and reply with ONLY the exact name: ${specialists.join(', ')}`, 'Router');
            if (!chosenModel || !specialists.includes(chosenModel)) chosenModel = "phi-mini-moe-q2";

            await callModel(chosenModel, latestMsg, 'Twitch');

            let previousReply = latestMsg;
            let previousModel = chosenModel;
            for (let i = 0; i < 1; i++) {
                let nextModel = await callModel(router, `Pick DIFFERENT model from this exact list and reply with ONLY the exact name: ${specialists.join(', ')}`, 'Router');
                if (!nextModel || !specialists.includes(nextModel)) nextModel = specialists[Math.floor(Math.random() * specialists.length)];
                previousReply = await callModel(nextModel, previousReply, previousModel);
                previousModel = nextModel;
                if (!previousReply) break;
            }
        }

        async function backgroundChatter() {
            const specialists = document.getElementById('specialistModels').value.split(',').map(m => m.trim()).filter(Boolean);
            if (specialists.length < 2) return;

            const router = document.getElementById('routerModel').value.trim();
            const randomModel1 = specialists[Math.floor(Math.random() * specialists.length)];
            const randomModel2 = specialists.filter(m => m !== randomModel1)[Math.floor(Math.random() * (specialists.length - 1))];

            let reply = await callModel(randomModel1, `Hey ${randomModel2}, what's up?`, randomModel2);
            if (reply) await callModel(randomModel2, reply, randomModel1);
        }

        function addTwitchMessage(user, msg) {
            const container = document.getElementById('twitchContainer');
            const div = document.createElement('div');
            div.className = 'twitch-msg';
            div.innerHTML = `<span class="text-blue-400">@${user}</span>: ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            twitchMessages.push({user, message: msg});
            if (twitchMessages.length > 80) twitchMessages.shift();
        }

        function connectTwitch() {
            const channel = 'boogercheeseonry';
            if (twitchWS) twitchWS.close();
            twitchWS = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
            twitchWS.onopen = () => {
                reconnectAttempts = 0;
                const nick = 'justinfan' + Math.floor(10000 + Math.random() * 90000);
                twitchWS.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                twitchWS.send(`PASS ${nick}`);
                twitchWS.send(`NICK ${nick}`);
                twitchWS.send(`JOIN #${channel}`);
                addTwitchMessage('SYSTEM', `✅ Connected LIVE to #${channel}`);
            };
            twitchWS.onmessage = (event) => {
                const line = event.data;
                if (line.includes('PRIVMSG')) {
                    const userMatch = line.match(/;display-name=([^;]+)/);
                    const user = userMatch ? userMatch[1] : 'viewer';
                    const message = line.split(' :').pop().trim();
                    addTwitchMessage(user, message);
                }
            };
            twitchWS.onclose = () => {
                twitchWS = null;
                if (reconnectAttempts < MAX_RECONNECT) setTimeout(connectTwitch, 2500);
            };
        }

        function toggleSettings() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('flex'); }
        function hideSettings() { const modal = document.getElementById('modal'); modal.classList.add('hidden'); modal.classList.remove('flex'); }

        window.onload = () => {
            chatContainer.innerHTML = `<div class="text-center text-zinc-500 py-12">Art exhibit ready.<br>Endless fast robot chatter — no thinking, no lockups.</div>`;
            connectTwitch();
            autoInterval = setInterval(autoProcessCrowd, 5000);

            backgroundInterval = setInterval(() => {
                if (document.getElementById('endlessChatter').checked) backgroundChatter();
            }, 7000);
        };
    </script>
</body>
</html>
